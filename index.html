    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --primary-glow: rgba(99,102,241,0.4);
            --bg-dark: #0a0a0a; --bg-card: linear-gradient(135deg, rgba(25,25,35,0.95) 0%, rgba(15,15,25,0.98) 100%);
            --border-light: rgba(255,255,255,0.08); --text-primary: #ffffff; --text-secondary: #a0a0b0;
            --success: #10b981; --warning: #f59e0b; --error: #ef4444; --pro: #8b5cf6; --new: #22c55e;
        }
        [data-theme="light"] {
            --bg-dark: #f5f5f5; --bg-card: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(245,245,250,0.98) 100%);
            --border-light: rgba(0,0,0,0.1); --text-primary: #1a1a1a; --text-secondary: #666666;
        }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow-x: hidden; min-height: 100vh; transition: background 0.3s ease; }
        .bg-ambient { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 20% 30%, rgba(99,102,241,0.15) 0%, transparent 50%); }
        
        /* PIN Modal - Fixed */
        .pin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .pin-container { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 32px; padding: 40px; max-width: 400px; width: 90%; text-align: center; }
        .pin-digits { display: flex; gap: 10px; justify-content: center; margin: 24px 0; flex-wrap: wrap; }
        .pin-digit { width: 55px; height: 65px; text-align: center; font-size: 1.8rem; font-weight: 600; background: rgba(30,30,40,0.9); border: 2px solid var(--border-light); border-radius: 16px; color: var(--text-primary); }
        .pin-digit:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
        .pin-submit { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 60px; color: white; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .pin-error { color: var(--error); font-size: 0.85rem; margin-top: 8px; min-height: 40px; }
        
        /* Install Prompt */
        .install-prompt { position: fixed; bottom: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--primary); border-radius: 60px; padding: 12px 24px; display: flex; align-items: center; gap: 16px; z-index: 150; backdrop-filter: blur(20px); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Collections */
        .collections-section { padding: 40px 24px; }
        .collections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .collection-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 24px; padding: 24px; cursor: pointer; transition: all 0.3s; }
        .collection-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .collection-icon { font-size: 2.5rem; margin-bottom: 16px; }
        .collection-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
        .collection-count { font-size: 0.8rem; color: var(--text-secondary); }
        
        /* Hero */
        .hero { padding: 60px 24px 40px; text-align: center; }
        .hero h1 { font-size: 4rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 20px; }
        .hero-tagline { font-size: 1.2rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto 20px; }
        .hero-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .hero-cta, .surprise-btn { display: inline-flex; align-items: center; gap: 12px; padding: 14px 32px; border-radius: 60px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .hero-cta { background: var(--primary); border: none; color: white; }
        .surprise-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); color: var(--text-primary); }
        .stats-showcase { display: flex; justify-content: center; gap: 40px; margin: 40px 0; }
        .stat-number { font-size: 2rem; font-weight: 700; color: var(--primary); }
        
        .recent-section, .trending-section { padding: 40px 24px; border-top: 1px solid var(--border-light); }
        .section-title { font-size: 1.5rem; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .recent-grid, .trending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; }
        .recent-item, .trending-item { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 16px; padding: 12px; cursor: pointer; transition: all 0.2s; }
        
        .main-content { display: none; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; padding: 24px; max-width: 1400px; margin: 0 auto; }
        .skeleton { height: 360px; border-radius: 24px; background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 24px; transition: all 0.3s; cursor: pointer; overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card-image { width: 100%; height: 180px; overflow: hidden; background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.05)); }
        .card-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card-content { padding: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .category-badge { padding: 4px 12px; background: rgba(99,102,241,0.15); border-radius: 100px; font-size: 0.7rem; font-weight: 600; color: var(--primary); }
        .pro-badge { padding: 4px 12px; background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(99,102,241,0.1)); border: 1px solid rgba(139,92,246,0.4); border-radius: 100px; font-size: 0.7rem; color: #c4b5fd; }
        .free-badge { padding: 4px 10px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 100px; font-size: 0.7rem; color: var(--success); }
        .favorite-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; padding: 8px; }
        .favorite-btn.active { color: #fbbf24; }
        .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
        .card-meta { font-size: 0.7rem; color: var(--text-secondary); display: flex; gap: 12px; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(16px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 32px; max-width: 500px; width: 90%; padding: 32px; max-height: 80vh; overflow-y: auto; }
        
        .footer { border-top: 1px solid var(--border-light); margin-top: 40px; padding: 40px 24px; text-align: center; }
        .social-links { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .social-link { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: rgba(99,102,241,0.1); border-radius: 50%; color: var(--text-primary); font-size: 1.3rem; text-decoration: none; transition: all 0.3s; }
        .social-link:hover { background: var(--primary); transform: translateY(-3px); color: white; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(20,20,30,0.95); backdrop-filter: blur(20px); border: 1px solid var(--primary); border-radius: 100px; padding: 12px 24px; z-index: 1100; animation: fadeInUp 0.3s ease; }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .collections-grid { grid-template-columns: 1fr; }
            .pin-digit { width: 45px; height: 55px; font-size: 1.3rem; }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
        
        button:focus-visible, a:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

<script>
    // ==================== CONFIGURATION ====================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxGBXI-W9rj6PzpeoSf_84HBq4CQnXwD9CoynIoRIfD9RWWyfArU7qf9R8yl4DTOchs/exec';
    const CACHE_KEY = 'ctfy_catalog_v9';
    const FAVORITES_KEY = 'ctfy_favorites';
    const VIEWS_KEY = 'ctfy_views';
    const CACHE_DURATION = 30 * 60 * 1000;
    
    let allItems = [], originalItems = [], favorites = new Set(), showOnlyFavorites = false, currentItem = null;
    let fuseInstance = null;
    let analyticsTimer = null;
    let pendingAnalytics = [];
    
    // ==================== COLLECTIONS ====================
    const COLLECTIONS = [
        { id: 'gaming-creator', name: '🎮 Gaming Creator Pack', icon: '🎮', filter: (item) => (item.Kategori || '').toLowerCase().includes('gaming') || (item.Nama || '').toLowerCase().includes('game') },
        { id: 'cinematic-editing', name: '🎬 Cinematic Editing Pack', icon: '🎬', filter: (item) => (item.Kategori || '').toLowerCase().includes('cinematic') || (item.Nama || '').toLowerCase().includes('cinematic') },
        { id: 'tiktok-creator', name: '🎵 TikTok Creator Pack', icon: '🎵', filter: (item) => (item.Kategori || '').toLowerCase().includes('tiktok') || (item.Nama || '').toLowerCase().includes('tiktok') },
        { id: 'logo-animation', name: '✨ Logo Animation Starter', icon: '✨', filter: (item) => (item.Kategori || '').toLowerCase().includes('logo') || (item.Nama || '').toLowerCase().includes('logo') },
        { id: 'motion-graphics', name: '🎨 Motion Graphics Pack', icon: '🎨', filter: (item) => (item.Kategori || '').toLowerCase().includes('motion') || (item.Nama || '').toLowerCase().includes('motion') }
    ];
    
    function updateCollections() {
        const updated = COLLECTIONS.map(c => ({ ...c, count: allItems.filter(c.filter).length }));
        document.getElementById('collectionsGrid').innerHTML = updated.map(c => `
            <div class="collection-card" onclick="openCollection('${c.id}')">
                <div class="collection-icon">${c.icon}</div>
                <div class="collection-title">${c.name}</div>
                <div class="collection-count">${c.count} assets</div>
            </div>
        `).join('');
    }
    
    function openCollection(collectionId) {
        const collection = COLLECTIONS.find(c => c.id === collectionId);
        if(collection) {
            showOnlyFavorites = false;
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = 'all';
            let filtered = allItems.filter(collection.filter);
            renderCards(filtered);
            document.getElementById('itemCount').innerHTML = `${filtered.length} / ${allItems.length}`;
            showToast(`Showing: ${collection.name}`, 'info');
            scrollToCatalog();
        }
    }
    
    // ==================== ANALYTICS (Fixed timer) ====================
    function trackEvent(type, itemId = null) {
        pendingAnalytics.push({ type, itemId, timestamp: Date.now(), ua: navigator.userAgent.slice(0, 100) });
        if(analyticsTimer) clearTimeout(analyticsTimer);
        analyticsTimer = setTimeout(flushAnalytics, 5000);
        if(pendingAnalytics.length >= 5) flushAnalytics();
    }
    
    function flushAnalytics() {
        if(!pendingAnalytics.length) return;
        const batch = [...pendingAnalytics];
        pendingAnalytics = [];
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'analytics', events: batch }) }).catch(() => {});
    }
    
    // ==================== CORE FUNCTIONS ====================
    function escapeHTML(str) { if(!str) return ''; return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function safeURL(url) { if(!url || typeof url !== 'string') return '#'; const t = url.trim(); if(t.startsWith('http://') || t.startsWith('https://')) return t; return '#'; }
    function isProItem(item) { return (item.Kategori || '').toLowerCase().includes('pro') || (item.Nama || '').toLowerCase().includes('pro'); }
    function getBadgeHTML(item) { return isProItem(item) ? '<span class="pro-badge">PRO</span>' : '<span class="free-badge">Gratis</span>'; }
    function showToast(msg, type = 'success') { const t = document.querySelector('.toast'); if(t) t.remove(); const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2500); }
    
    function loadFavorites() { try { const saved = localStorage.getItem(FAVORITES_KEY); if(saved) favorites = new Set(JSON.parse(saved)); } catch(e) {} updateFavCount(); }
    function saveFavorites() { localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favorites])); }
    function toggleFavorite(id, e) { e.stopPropagation(); favorites.has(id) ? favorites.delete(id) : favorites.add(id); saveFavorites(); updateFavCount(); applyFilters(); showToast(favorites.has(id) ? 'Added to favorites' : 'Removed from favorites'); }
    function isFavorite(id) { return favorites.has(id); }
    function updateFavCount() { const favSpan = document.getElementById('favCount'); if(favSpan) favSpan.innerText = favorites.size; }
    
    function recordView(itemId) { let views = JSON.parse(localStorage.getItem(VIEWS_KEY) || '{}'); views[itemId] = (views[itemId] || 0) + 1; localStorage.setItem(VIEWS_KEY, JSON.stringify(views)); trackEvent('view', itemId); addToRecent(itemId); }
    function getViews(itemId) { let views = JSON.parse(localStorage.getItem(VIEWS_KEY) || '{}'); return views[itemId] || 0; }
    
    function addToRecent(itemId) { let recent = JSON.parse(localStorage.getItem('ctfy_recent') || '[]'); recent = [itemId, ...recent.filter(id => id !== itemId)].slice(0, 10); localStorage.setItem('ctfy_recent', JSON.stringify(recent)); renderRecent(); }
    
    function renderRecent() {
        let recent = JSON.parse(localStorage.getItem('ctfy_recent') || '[]');
        const items = recent.map(id => allItems.find(i => i.Kode === id)).filter(i => i);
        const section = document.getElementById('recentSection');
        if(!items.length) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        document.getElementById('recentGrid').innerHTML = items.map(i => `<div class="recent-item" onclick="openModalByCode('${escapeHTML(i.Kode)}')"><div><h4>${escapeHTML(i.Nama || 'Untitled')}</h4></div></div>`).join('');
    }
    
    function renderTrending() {
        let trending = [...allItems].sort((a,b) => getViews(b.Kode) - getViews(a.Kode)).slice(0, 6);
        // Fallback: if all views are 0, show newest
        if(trending.every(i => getViews(i.Kode) === 0)) trending = [...allItems].slice(0, 6);
        document.getElementById('trendingGrid').innerHTML = trending.map(i => `<div class="trending-item" onclick="openModalByCode('${escapeHTML(i.Kode)}')"><div><h4>${escapeHTML(i.Nama || 'Untitled')}</h4><p>${getViews(i.Kode)} views</p></div></div>`).join('');
    }
    
    function surpriseMe() { if(allItems.length) { const random = allItems[Math.floor(Math.random() * allItems.length)]; openModal(random); } }
    function scrollToCatalog() { document.getElementById('catalogHeader').scrollIntoView({ behavior: 'smooth' }); }
    
    function initFuse() { fuseInstance = new Fuse(allItems, { keys: ['Nama', 'Kategori', 'Kode'], threshold: 0.3 }); }
    
    function smartSearch(query) {
        if(!query || query.length < 2) return allItems;
        if(fuseInstance) { const results = fuseInstance.search(query); return results.map(r => r.item); }
        return allItems.filter(i => (i.Nama || '').toLowerCase().includes(query.toLowerCase()) || (i.Kategori || '').toLowerCase().includes(query.toLowerCase()));
    }
    
    async function loadData() {
        const grid = document.getElementById('cardGrid');
        if(grid) grid.innerHTML = '<div class="skeleton"></div>'.repeat(6);
        
        const cached = localStorage.getItem(CACHE_KEY);
        if(cached) {
            try {
                const { data, timestamp } = JSON.parse(cached);
                if(Date.now() - timestamp < CACHE_DURATION) {
                    originalItems = data; allItems = [...originalItems].reverse();
                    initFuse(); populateFilters(); applyFilters(); updateStats(); updateCollections(); renderTrending(); renderRecent();
                    processURLParams(); return;
                }
            } catch(e) {}
        }
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            const res = await fetch(API_URL, { signal: controller.signal });
            clearTimeout(timeoutId);
            const raw = await res.json();
            originalItems = Array.isArray(raw) ? raw.filter(i => i && typeof i === 'object') : [];
            allItems = [...originalItems].reverse();
            localStorage.setItem(CACHE_KEY, JSON.stringify({ data: originalItems, timestamp: Date.now() }));
            initFuse(); populateFilters(); applyFilters(); updateStats(); updateCollections(); renderTrending(); renderRecent();
            processURLParams(); showToast(`${allItems.length} items loaded`, 'success');
        } catch(err) {
            if(grid) grid.innerHTML = `<div class="empty-state"><h3>Gagal memuat data</h3><button onclick="loadData()" style="margin-top:20px;padding:12px 24px;background:var(--primary);border:none;border-radius:12px;color:white;cursor:pointer;">Coba Lagi</button></div>`;
        }
    }
    
    function populateFilters() {
        const cats = [...new Set(originalItems.map(i => i.Kategori || 'Umum'))].sort();
        const catSelect = document.getElementById('categoryFilter');
        if(catSelect) catSelect.innerHTML = '<option value="all">Semua Kategori</option>' + cats.map(c => `<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`).join('');
    }
    
    function applyFilters() {
        const search = document.getElementById('searchInput')?.value || '';
        const category = document.getElementById('categoryFilter')?.value || 'all';
        let filtered = smartSearch(search);
        if(category !== 'all') filtered = filtered.filter(i => (i.Kategori || 'Umum') === category);
        if(showOnlyFavorites) filtered = filtered.filter(i => isFavorite(i.Kode));
        renderCards(filtered);
        const countSpan = document.getElementById('itemCount');
        if(countSpan) countSpan.innerHTML = `${filtered.length} / ${allItems.length}`;
    }
    
    function renderCards(items) {
        const grid = document.getElementById('cardGrid');
        if(!grid) return;
        if(!items.length) { grid.innerHTML = `<div class="empty-state"><h3>Tidak ada item</h3><button onclick="resetFilters()" style="margin-top:20px;padding:12px 28px;background:var(--primary);border:none;border-radius:60px;color:white;cursor:pointer;">Reset Filter</button></div>`; return; }
        
        grid.innerHTML = items.map((item, idx) => {
            const hasImage = item.Thumbnail && item.Thumbnail !== '#';
            return `
                <div class="card" data-idx="${idx}" onclick="openModalByCode('${escapeHTML(item.Kode)}')">
                    <div class="card-image">
                        ${hasImage ? `<img src="${safeURL(item.Thumbnail)}" alt="${escapeHTML(item.Nama)}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\\'padding:60px;text-align:center\\'>📷</div>'">` : '<div style="padding:60px;text-align:center">📷</div>'}
                    </div>
                    <div class="card-content">
                        <div class="card-header">
                            <span class="category-badge">${escapeHTML(item.Kategori || 'Umum')}</span>
                            ${getBadgeHTML(item)}
                            <button class="favorite-btn ${isFavorite(item.Kode) ? 'active' : ''}" onclick="event.stopPropagation();toggleFavorite('${escapeHTML(item.Kode)}',event)"><i class="${isFavorite(item.Kode) ? 'fas' : 'far'} fa-star"></i></button>
                        </div>
                        <h3 class="card-title">${escapeHTML(item.Nama || 'Untitled')}</h3>
                        <div class="card-meta"><span>👁️ ${getViews(item.Kode)} views</span></div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function openModal(item) {
        currentItem = item;
        recordView(item.Kode);
        trackEvent('open', item.Kode);
        document.getElementById('modalTitle').innerText = item.Nama || 'Detail';
        document.getElementById('modalBadges').innerHTML = `<span class="category-badge">${escapeHTML(item.Kategori || 'Umum')}</span>${getBadgeHTML(item)}`;
        document.getElementById('modalDetail').innerHTML = `<div>👁️ ${getViews(item.Kode)} views</div><div>📦 ${item.FileSize || '12 MB'}</div>`;
        
        const links = [];
        if(item.Link5MB && item.Link5MB !== '#') links.push({ label: '📦 Versi 5MB', url: safeURL(item.Link5MB) });
        if(item.LinkDrive && item.LinkDrive !== '#') links.push({ label: '📁 Drive / Full', url: safeURL(item.LinkDrive) });
        if(item.LinkAsset && item.LinkAsset !== '#') links.push({ label: '📎 Asset', url: safeURL(item.LinkAsset) });
        
        document.getElementById('modalLinks').innerHTML = links.length ? links.map(l => `<div><a href="${l.url}" target="_blank" style="color:var(--primary);text-decoration:none;">${l.label}</a></div>`).join('') : '<div>Tidak ada link</div>';
        document.getElementById('modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        const url = new URL(window.location); url.searchParams.set('code', item.Kode); window.history.pushState({}, '', url);
    }
    
    function openModalByCode(code) { const item = allItems.find(i => i.Kode === code); if(item) openModal(item); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = ''; const url = new URL(window.location); url.searchParams.delete('code'); window.history.pushState({}, '', url); }
    function copyAssetLink() { if(currentItem) { navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?code=${currentItem.Kode}`); showToast('Link copied!'); } }
    function shareAsset() { if(currentItem && navigator.share) navigator.share({ title: currentItem.Nama, url: `${window.location.origin}${window.location.pathname}?code=${currentItem.Kode}` }).catch(() => copyAssetLink()); else copyAssetLink(); }
    function resetFilters() { showOnlyFavorites = false; document.getElementById('searchInput').value = ''; document.getElementById('categoryFilter').value = 'all'; applyFilters(); showToast('Filters reset'); }
    function updateStats() { const assetSpan = document.getElementById('statAssets'); if(assetSpan) assetSpan.innerText = originalItems.length; }
    function processURLParams() { const params = new URLSearchParams(window.location.search); const code = params.get('code'); if(code) { const item = allItems.find(i => i.Kode === code); if(item) setTimeout(() => openModal(item), 300); } }
    
    function initTheme() { const saved = localStorage.getItem('ctfy_theme') || 'dark'; if(saved === 'light') document.documentElement.setAttribute('data-theme', 'light'); document.getElementById('themeToggle').addEventListener('click', () => { const cur = document.documentElement.getAttribute('data-theme'); if(cur === 'light') { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('ctfy_theme', 'dark'); } else { document.documentElement.setAttribute('data-theme', 'light'); localStorage.setItem('ctfy_theme', 'light'); } }); }
    
    function initEvents() {
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const resetBtn = document.getElementById('resetBtn');
        const showFavOnly = document.getElementById('showFavOnly');
        const surpriseBtn = document.getElementById('surpriseBtn');
        
        if(searchInput) searchInput.addEventListener('input', () => applyFilters());
        if(categoryFilter) categoryFilter.addEventListener('change', () => applyFilters());
        if(resetBtn) resetBtn.addEventListener('click', resetFilters);
        if(showFavOnly) showFavOnly.addEventListener('click', () => { showOnlyFavorites = !showOnlyFavorites; applyFilters(); showToast(showOnlyFavorites ? 'Showing favorites only' : 'Showing all items'); });
        if(surpriseBtn) surpriseBtn.addEventListener('click', surpriseMe);
        
        window.addEventListener('popstate', () => processURLParams());
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
    }
    
    function verifyPIN() {
        let pin = '';
        for(let i = 1; i <= 6; i++) {
            const input = document.getElementById(`pin${i}`);
            if(input) pin += input.value;
        }
        if(pin === '123456') {
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('mainContent').classList.add('visible');
            loadData(); initTheme(); loadFavorites(); initEvents();
        } else {
            const errorDiv = document.getElementById('pinError');
            if(errorDiv) errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> PIN salah! Silakan coba lagi.';
            for(let i = 1; i <= 6; i++) { const input = document.getElementById(`pin${i}`); if(input) input.value = ''; }
            const pin1 = document.getElementById('pin1'); if(pin1) pin1.focus();
        }
    }
    
    function autoTab() {
        for(let i = 1; i <= 5; i++) {
            const input = document.getElementById(`pin${i}`);
            if(input) {
                input.addEventListener('input', (e) => { if(e.target.value.length === 1) { const next = document.getElementById(`pin${i+1}`); if(next) next.focus(); } });
            }
        }
        for(let i = 2; i <= 6; i++) {
            const input = document.getElementById(`pin${i}`);
            if(input) {
                input.addEventListener('keydown', (e) => { if(e.key === 'Backspace' && !e.target.value) { const prev = document.getElementById(`pin${i-1}`); if(prev) prev.focus(); } });
            }
        }
        const pin6 = document.getElementById('pin6');
        if(pin6) pin6.addEventListener('keydown', (e) => { if(e.key === 'Enter') verifyPIN(); });
    }
    
    // Expose globals
    window.verifyPIN = verifyPIN;
    window.closeModal = closeModal;
    window.openModalByCode = openModalByCode;
    window.toggleFavorite = toggleFavorite;
    window.openCollection = openCollection;
    window.copyAssetLink = copyAssetLink;
    window.shareAsset = shareAsset;
    window.scrollToCatalog = scrollToCatalog;
    window.resetFilters = resetFilters;
    
    autoTab();
</script>
</body>
</html>
