<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="CTFY - Premium Digital Assets Catalog. Kumpulan resource digital premium untuk kreator konten.">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- SEO Meta Tags -->
    <meta property="og:title" content="CTFY | Premium Digital Assets Catalog">
    <meta property="og:description" content="Katalog resource digital premium untuk kreator konten">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://ctfy.my.id">
    <link rel="manifest" href="manifest.json">
    
    <title>CTFY | Premium Digital Assets Catalog</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --primary-glow: rgba(99,102,241,0.4);
            --bg-dark: #0a0a0a; --bg-card: linear-gradient(135deg, rgba(25,25,35,0.95) 0%, rgba(15,15,25,0.98) 100%);
            --border-light: rgba(255,255,255,0.08); --text-primary: #ffffff; --text-secondary: #a0a0b0;
            --success: #10b981; --warning: #f59e0b; --error: #ef4444; --pro: #8b5cf6; --new: #22c55e;
        }
        [data-theme="light"] {
            --bg-dark: #f5f5f5; --bg-card: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(245,245,250,0.98) 100%);
            --border-light: rgba(0,0,0,0.1); --text-primary: #1a1a1a; --text-secondary: #666666;
        }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow-x: hidden; min-height: 100vh; }
        .bg-ambient { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 20% 30%, rgba(99,102,241,0.15) 0%, transparent 50%); }
        
        /* PWA Install Prompt */
        .install-prompt { position: fixed; bottom: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--primary); border-radius: 60px; padding: 12px 24px; display: flex; align-items: center; gap: 16px; z-index: 150; backdrop-filter: blur(20px); animation: slideIn 0.3s ease; }
        .install-prompt button { background: var(--primary); border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; font-weight: 600; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Collections Section */
        .collections-section { padding: 40px 24px; }
        .collections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .collection-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 24px; padding: 24px; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
        .collection-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .collection-icon { font-size: 2.5rem; margin-bottom: 16px; }
        .collection-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
        .collection-count { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 12px; }
        .collection-preview { display: flex; gap: 8px; margin-top: 16px; }
        .collection-preview img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        
        /* Request Asset Modal */
        .request-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(16px); align-items: center; justify-content: center; z-index: 2000; }
        .request-content { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 32px; padding: 32px; max-width: 500px; width: 90%; }
        .request-content input, .request-content select, .request-content textarea { width: 100%; padding: 12px; margin: 12px 0; background: rgba(30,30,40,0.9); border: 1px solid var(--border-light); border-radius: 12px; color: var(--text-primary); font-family: inherit; }
        .request-content button { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 60px; color: white; font-weight: 600; cursor: pointer; margin-top: 16px; }
        
        /* Hero */
        .hero { padding: 60px 24px 40px; text-align: center; }
        .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); border-radius: 100px; padding: 8px 20px; font-size: 0.85rem; margin-bottom: 24px; }
        .hero h1 { font-size: 4rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 20px; }
        .hero-tagline { font-size: 1.2rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto 20px; }
        .hero-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .hero-cta, .surprise-btn, .request-btn { display: inline-flex; align-items: center; gap: 12px; padding: 14px 32px; border-radius: 60px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .hero-cta { background: var(--primary); border: none; color: white; }
        .surprise-btn, .request-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); color: var(--text-primary); }
        
        .stats-showcase { display: flex; justify-content: center; gap: 40px; margin: 40px 0; flex-wrap: wrap; }
        .stat-item { text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
        
        .recent-section, .trending-section { padding: 40px 24px; border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); margin: 20px 0; }
        .section-title { font-size: 1.5rem; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .recent-grid, .trending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; }
        .recent-item, .trending-item { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 16px; padding: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        
        .main-content { display: none; }
        .main-content.visible { display: block; }
        .header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-light); }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
        .gradient-text { background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
        
        .search-wrapper { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0 16px; }
        .search-input-group { flex: 2; min-width: 200px; position: relative; }
        .search-input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .search-input { width: 100%; padding: 12px 16px 12px 44px; background: rgba(30,30,40,0.9); border: 1px solid var(--border-light); border-radius: 60px; color: var(--text-primary); font-family: inherit; }
        .filter-select { flex: 1; min-width: 150px; padding: 12px 16px; background: rgba(30,30,40,0.9); border: 1px solid var(--border-light); border-radius: 60px; color: var(--text-primary); cursor: pointer; }
        .btn-reset { padding: 12px 24px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); border-radius: 60px; color: var(--text-primary); cursor: pointer; }
        .stats-bar { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; padding-top: 16px; border-top: 1px solid var(--border-light); }
        .stat-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; background: rgba(99,102,241,0.1); border-radius: 100px; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; }
        
        .keyboard-hint { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 100px; font-size: 0.7rem; z-index: 90; }
        .keyboard-hint kbd { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 6px; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; padding: 24px; max-width: 1400px; margin: 0 auto; }
        .skeleton { height: 380px; border-radius: 24px; background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 24px; transition: all 0.3s; cursor: pointer; overflow: hidden; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card-image { width: 100%; height: 200px; overflow: hidden; background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.05)); }
        .card-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; aspect-ratio: 16/9; opacity: 0; }
        .card-image img.loaded { opacity: 1; }
        .card-content { padding: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .category-badge { padding: 4px 12px; background: rgba(99,102,241,0.15); border-radius: 100px; font-size: 0.7rem; font-weight: 600; color: var(--primary); }
        .pro-badge { padding: 4px 12px; background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(99,102,241,0.1)); border: 1px solid rgba(139,92,246,0.4); border-radius: 100px; font-size: 0.7rem; color: #c4b5fd; }
        .free-badge { padding: 4px 10px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 100px; font-size: 0.7rem; color: var(--success); }
        .new-badge { padding: 4px 10px; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); border-radius: 100px; font-size: 0.7rem; color: var(--new); }
        .card-meta { display: flex; gap: 12px; margin: 8px 0; font-size: 0.7rem; color: var(--text-secondary); flex-wrap: wrap; }
        .favorite-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; padding: 8px; }
        .favorite-btn.active { color: #fbbf24; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        
        .modal, .command-palette, .pin-overlay { display: none; }
        .footer { border-top: 1px solid var(--border-light); margin-top: 40px; padding: 40px 24px 30px; }
        .footer-content { max-width: 1400px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 24px; }
        .social-links { display: flex; gap: 20px; }
        .social-link { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: rgba(99,102,241,0.1); border-radius: 50%; color: var(--text-primary); font-size: 1.3rem; text-decoration: none; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(20,20,30,0.95); backdrop-filter: blur(20px); border: 1px solid var(--primary); border-radius: 100px; padding: 12px 24px; z-index: 1100; }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .collections-grid { grid-template-columns: 1fr; }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, .card, .skeleton { animation: none !important; transition: none !important; }
        }
        
        .focus-visible:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
        button:focus-visible, a:focus-visible, input:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    </style>
</head>
<body>

<div class="bg-ambient"></div>

<div id="pinOverlay" class="pin-overlay"><div class="pin-container"><i class="fas fa-lock" style="font-size:3rem;color:var(--primary);margin-bottom:16px;"></i><h2>Enter PIN</h2><div style="display:flex;gap:10px;justify-content:center;margin:24px 0;"><input type="password" maxlength="1" class="pin-digit" id="pin1" style="width:55px;height:65px;text-align:center;font-size:1.8rem;background:rgba(30,30,40,0.9);border:2px solid var(--border-light);border-radius:16px;"></div><button class="pin-submit" onclick="verifyPIN()">Verifikasi</button></div></div>

<div id="mainContent" class="main-content">
    <section class="hero">
        <div class="hero-badge"><i class="fas fa-bolt"></i> Premium Digital Assets</div>
        <h1><span class="gradient-text">CTFY</span></h1>
        <div class="hero-tagline">Create • Tools • Files • You</div>
        <div class="hero-actions">
            <button class="hero-cta" onclick="scrollToCatalog()"><i class="fas fa-compass"></i> Explore</button>
            <button class="surprise-btn" id="surpriseBtn"><i class="fas fa-dice-d6"></i> Surprise Me</button>
            <button class="request-btn" id="requestBtn"><i class="fas fa-plus"></i> Request Asset</button>
        </div>
        <div class="stats-showcase"><div class="stat-item"><div class="stat-number" id="statAssets">0</div><div class="stat-label">Assets</div></div></div>
    </section>

    <!-- COLLECTIONS SECTION -->
    <section class="collections-section">
        <div class="section-title"><i class="fas fa-layer-group"></i> Curated Collections</div>
        <div class="collections-grid" id="collectionsGrid"></div>
    </section>

    <section class="recent-section" id="recentSection" style="display:none;"><div class="section-title"><i class="fas fa-history"></i> Continue Browsing</div><div class="recent-grid" id="recentGrid"></div></section>
    <section class="trending-section"><div class="section-title"><i class="fas fa-fire"></i> Trending</div><div class="trending-grid" id="trendingGrid"></div></section>

    <header class="header" id="catalogHeader"><div class="container"><div style="display:flex;justify-content:space-between;"><div><h1 style="font-size:1.5rem;"><span class="gradient-text">CTFY</span></h1></div><div><button id="themeToggle" class="stat-pill"><i class="fas fa-moon"></i></button></div></div><div class="search-wrapper"><div class="search-input-group"><i class="fas fa-search"></i><input type="text" id="searchInput" class="search-input" placeholder="Cari item..."></div><select id="categoryFilter" class="filter-select"><option value="all">Semua Kategori</option></select><button id="resetBtn" class="btn-reset">Reset</button></div><div class="stats-bar"><div class="stat-pill"><i class="fas fa-layer-group"></i> <span id="itemCount">0</span> item</div><button id="showFavOnly" class="stat-pill"><i class="fas fa-heart"></i> Favorit</button></div></div></header>

    <main><div id="cardGrid" class="card-grid"></div></main>

    <footer class="footer"><div class="footer-content"><div><h3 class="gradient-text">CTFY</h3><p>Create • Tools • Files • You</p></div><div class="social-links"><a href="#" class="social-link"><i class="fab fa-tiktok"></i></a><a href="#" class="social-link"><i class="fab fa-instagram"></i></a><a href="#" class="social-link"><i class="fab fa-youtube"></i></a></div><div><a href="mailto:myxrin2748@gmail.com"><i class="fas fa-envelope"></i> myxrin2748@gmail.com</a></div></div></footer>
</div>

<div id="requestModal" class="request-modal"><div class="request-content"><h2 style="margin-bottom:20px;">Request Asset</h2><input type="text" id="reqName" placeholder="Nama Asset"><select id="reqCategory"><option>Motion Graphic</option><option>Template</option><option>Sound Effect</option></select><textarea id="reqDesc" rows="3" placeholder="Deskripsi / link referensi..."></textarea><button onclick="submitRequest()">Kirim Request</button><button onclick="closeRequestModal()" style="background:transparent;margin-top:8px;">Batal</button></div></div>

<script>
    // ==================== PRODUCTION CONFIG ====================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxGBXI-W9rj6PzpeoSf_84HBq4CQnXwD9CoynIoRIfD9RWWyfArU7qf9R8yl4DTOchs/exec';
    const ANALYTICS_URL = 'https://script.google.com/macros/s/YOUR_ANALYTICS_ENDPOINT/exec'; // Ganti dengan endpoint real
    const CACHE_KEY = 'ctfy_catalog_v8';
    const FAVORITES_KEY = 'ctfy_favorites';
    const VIEWS_KEY = 'ctfy_views_server_sync';
    
    let allItems = [], originalItems = [], favorites = new Set(), showOnlyFavorites = false, currentItem = null;
    let pendingAnalytics = [];
    let deferredPrompt = null;
    
    // ==================== COLLECTIONS DATA ====================
    const COLLECTIONS = [
        { id: 'gaming-creator', name: '🎮 Gaming Creator Pack', icon: '🎮', count: 0, previews: [], filter: (item) => item.Kategori?.toLowerCase().includes('gaming') || item.Nama?.toLowerCase().includes('game') },
        { id: 'cinematic-editing', name: '🎬 Cinematic Editing Pack', icon: '🎬', count: 0, previews: [], filter: (item) => item.Kategori?.toLowerCase().includes('cinematic') || item.Nama?.toLowerCase().includes('cinematic') },
        { id: 'tiktok-creator', name: '🎵 TikTok Creator Pack', icon: '🎵', count: 0, previews: [], filter: (item) => item.Kategori?.toLowerCase().includes('tiktok') || item.Nama?.toLowerCase().includes('tiktok') },
        { id: 'logo-animation', name: '✨ Logo Animation Starter', icon: '✨', count: 0, previews: [], filter: (item) => item.Kategori?.toLowerCase().includes('logo') || item.Nama?.toLowerCase().includes('logo') },
        { id: 'motion-graphics', name: '🎨 Motion Graphics Pack', icon: '🎨', count: 0, previews: [], filter: (item) => item.Kategori?.toLowerCase().includes('motion') || item.Nama?.toLowerCase().includes('motion') }
    ];
    
    function updateCollectionsCount() {
        COLLECTIONS.forEach(c => { c.count = allItems.filter(c.filter).length; c.previews = allItems.filter(c.filter).slice(0, 3).map(i => i.Thumbnail); });
        const grid = document.getElementById('collectionsGrid');
        if(grid) grid.innerHTML = COLLECTIONS.map(c => `<div class="collection-card" onclick="openCollection('${c.id}')"><div class="collection-icon">${c.icon}</div><div class="collection-title">${c.name}</div><div class="collection-count">${c.count} assets</div><div class="collection-preview">${c.previews.map(p => p ? `<img src="${p}" onerror="this.style.display='none'">` : '').join('')}</div></div>`).join('');
    }
    
    function openCollection(collectionId) {
        const collection = COLLECTIONS.find(c => c.id === collectionId);
        if(collection) { showOnlyFavorites = false; document.getElementById('searchInput').value = ''; document.getElementById('categoryFilter').value = 'all'; applyFilters(collection.filter); showToast(`Showing: ${collection.name}`, 'info'); scrollToCatalog(); }
    }
    
    // ==================== SERVER-SIDE ANALYTICS ====================
    function trackEvent(eventType, itemId = null) {
        const event = { type: eventType, itemId, timestamp: Date.now(), userAgent: navigator.userAgent, referrer: document.referrer };
        pendingAnalytics.push(event);
        if(pendingAnalytics.length >= 5) flushAnalytics();
        else setTimeout(() => flushAnalytics(), 5000);
    }
    
    async function flushAnalytics() {
        if(!pendingAnalytics.length) return;
        const batch = [...pendingAnalytics];
        pendingAnalytics = [];
        try { await fetch(ANALYTICS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(batch) }); } catch(e) { console.warn('Analytics failed:', e); }
    }
    
    function recordView(itemId) { 
        let views = JSON.parse(localStorage.getItem(VIEWS_KEY) || '{}'); 
        views[itemId] = (views[itemId] || 0) + 1; 
        localStorage.setItem(VIEWS_KEY, JSON.stringify(views)); 
        trackEvent('view', itemId); 
        addToRecent(itemId); 
    }
    function getViews(itemId) { let views = JSON.parse(localStorage.getItem(VIEWS_KEY) || '{}'); return views[itemId] || 0; }
    
    // ==================== PWA INSTALL ====================
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; showInstallPrompt(); });
    function showInstallPrompt() { const banner = document.createElement('div'); banner.className = 'install-prompt'; banner.innerHTML = `<span>📱 Install CTFY App</span><button id="installBtn">Install</button>`; document.body.appendChild(banner); document.getElementById('installBtn')?.addEventListener('click', async () => { if(deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; deferredPrompt = null; banner.remove(); } }); }
    
    // ==================== REQUEST ASSET ====================
    function openRequestModal() { document.getElementById('requestModal').style.display = 'flex'; }
    function closeRequestModal() { document.getElementById('requestModal').style.display = 'none'; }
    async function submitRequest() {
        const name = document.getElementById('reqName').value;
        const category = document.getElementById('reqCategory').value;
        const desc = document.getElementById('reqDesc').value;
        if(!name) { showToast('Masukkan nama asset', 'error'); return; }
        try { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'request', name, category, desc }) }); showToast('Request terkirim!', 'success'); closeRequestModal(); } catch(e) { showToast('Gagal mengirim request', 'error'); }
    }
    
    // ==================== CORE FUNCTIONS ====================
    function escapeHTML(str) { if(!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function safeURL(url) { if(!url || typeof url !== 'string') return '#'; const t = url.trim(); if(t.startsWith('http://')||t.startsWith('https://')) return t; return t==='#'? '#':'https://'+t; }
    function isProItem(item) { const k = (item.Kategori||'').toLowerCase(); const n = (item.Nama||'').toLowerCase(); return k.includes('pro')||n.includes('pro'); }
    function getBadgeHTML(item) { let html = isProItem(item)?'<span class="pro-badge">PRO</span>':'<span class="free-badge">Gratis</span>'; return html; }
    
    function loadFavorites() { try { const saved = localStorage.getItem(FAVORITES_KEY); if(saved) favorites = new Set(JSON.parse(saved)); } catch(e) {} updateFavCount(); }
    function saveFavorites() { localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favorites])); }
    function toggleFavorite(id, e) { e.stopPropagation(); favorites.has(id)?favorites.delete(id):favorites.add(id); saveFavorites(); updateFavCount(); applyFilters(); showToast(favorites.has(id)?'Added to favorites':'Removed from favorites'); }
    function isFavorite(id) { return favorites.has(id); }
    function updateFavCount() { document.getElementById('favCount').innerText = favorites.size; }
    
    function addToRecent(itemId) { let recent = JSON.parse(localStorage.getItem('ctfy_recent')||'[]'); recent = [itemId, ...recent.filter(id=>id!==itemId)].slice(0,10); localStorage.setItem('ctfy_recent',JSON.stringify(recent)); renderRecent(); }
    function renderRecent() { let recent = JSON.parse(localStorage.getItem('ctfy_recent')||'[]'); const items = recent.map(id=>allItems.find(i=>i.Kode===id)).filter(i=>i); const section = document.getElementById('recentSection'); if(!items.length) { section.style.display='none'; return; } section.style.display='block'; document.getElementById('recentGrid').innerHTML = items.map(i=>`<div class="recent-item" onclick="openModalByCode('${escapeHTML(i.Kode)}')"><div><h4 style="font-size:0.85rem;">${escapeHTML(i.Nama||'Untitled')}</h4></div></div>`).join(''); }
    
    function renderTrending() { const trending = [...allItems].sort((a,b)=>getViews(b.Kode)-getViews(a.Kode)).slice(0,6); document.getElementById('trendingGrid').innerHTML = trending.map(i=>`<div class="trending-item" onclick="openModalByCode('${escapeHTML(i.Kode)}')"><div><h4 style="font-size:0.85rem;">${escapeHTML(i.Nama||'Untitled')}</h4><p style="font-size:0.7rem;">${getViews(i.Kode)} views</p></div></div>`).join(''); }
    
    function surpriseMe() { if(allItems.length) { const random = allItems[Math.floor(Math.random()*allItems.length)]; openModal(random); } }
    function scrollToCatalog() { document.getElementById('catalogHeader').scrollIntoView({ behavior:'smooth' }); }
    
    async function loadData() {
        document.getElementById('cardGrid').innerHTML = '<div class="skeleton"></div>'.repeat(6);
        const cached = localStorage.getItem(CACHE_KEY);
        if(cached) { const { data, timestamp } = JSON.parse(cached); if(Date.now()-timestamp < 30*60*1000) { originalItems = data; allItems = [...originalItems].reverse(); updateCollectionsCount(); populateFilters(); applyFilters(); updateHeroStats(); renderTrending(); renderRecent(); processURLParams(); return; } }
        try { const res = await fetch(API_URL); const raw = await res.json(); originalItems = Array.isArray(raw)?raw.filter(i=>i&&typeof i==='object'):[]; allItems = [...originalItems].reverse(); localStorage.setItem(CACHE_KEY, JSON.stringify({ data: originalItems, timestamp: Date.now() })); updateCollectionsCount(); populateFilters(); applyFilters(); updateHeroStats(); renderTrending(); renderRecent(); processURLParams(); showToast(`${allItems.length} items loaded`); } catch(err) { document.getElementById('cardGrid').innerHTML = `<div class="empty-state"><h3>Failed to load</h3><button onclick="loadData()">Retry</button></div>`; }
    }
    
    function populateFilters() { const cats = [...new Set(originalItems.map(i=>i.Kategori||'Umum'))].sort(); const catSelect = document.getElementById('categoryFilter'); catSelect.innerHTML = '<option value="all">All Categories</option>'+cats.map(c=>`<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`).join(''); }
    
    function applyFilters(collectionFilter = null) {
        let filtered = [...allItems];
        const search = document.getElementById('searchInput').value.toLowerCase();
        if(search) filtered = filtered.filter(i=>i.Nama?.toLowerCase().includes(search)||i.Kategori?.toLowerCase().includes(search));
        const category = document.getElementById('categoryFilter').value;
        if(category !== 'all') filtered = filtered.filter(i=>(i.Kategori||'Umum')===category);
        if(showOnlyFavorites) filtered = filtered.filter(i=>isFavorite(i.Kode));
        if(collectionFilter) filtered = filtered.filter(collectionFilter);
        renderCards(filtered);
        document.getElementById('itemCount').innerHTML = `${filtered.length} / ${allItems.length}`;
    }
    
    function renderCards(items) {
        const grid = document.getElementById('cardGrid');
        if(!items.length) { grid.innerHTML = `<div class="empty-state"><h3>No items found</h3><button onclick="resetFilters()">Reset Filters</button></div>`; return; }
        grid.innerHTML = items.map((item,idx)=>`<div class="card" data-idx="${idx}" onclick="openModalByCode('${escapeHTML(item.Kode)}')"><div class="card-image"><img src="${safeURL(item.Thumbnail)}" alt="${escapeHTML(item.Nama)}" loading="lazy" onload="this.classList.add('loaded')" onerror="this.parentElement.innerHTML='<div class=\\'image-placeholder\\'>No Image</div>'"></div><div class="card-content"><div class="card-header"><span class="category-badge">${escapeHTML(item.Kategori||'Umum')}</span>${getBadgeHTML(item)}<button class="favorite-btn ${isFavorite(item.Kode)?'active':''}" onclick="event.stopPropagation();toggleFavorite('${escapeHTML(item.Kode)}',event)"><i class="${isFavorite(item.Kode)?'fas':'far'} fa-star"></i></button></div><h3 class="card-title">${escapeHTML(item.Nama||'Untitled')}</h3><div class="card-meta"><span><i class="fas fa-eye"></i> ${getViews(item.Kode)} views</span></div></div></div>`).join('');
    }
    
    function openModal(item) { currentItem = item; recordView(item.Kode); trackEvent('open_modal', item.Kode); const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex'; modal.innerHTML = `<div class="modal-content"><div style="display:flex;justify-content:space-between;"><h2>${escapeHTML(item.Nama)}</h2><button onclick="this.closest('.modal').remove()" style="background:none;border:none;font-size:2rem;">&times;</button></div><div class="modal-detail"><div>Kategori: ${escapeHTML(item.Kategori)}</div><div>Views: ${getViews(item.Kode)}</div></div><div class="share-buttons"><button onclick="copyAssetLink()" class="share-btn">Copy Link</button><button onclick="shareAsset()" class="share-btn">Share</button></div></div>`; document.body.appendChild(modal); const url = new URL(window.location); url.searchParams.set('code', item.Kode); window.history.pushState({}, '', url); }
    function openModalByCode(code) { const item = allItems.find(i=>i.Kode===code); if(item) openModal(item); }
    function copyAssetLink() { if(currentItem) navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?code=${currentItem.Kode}`); showToast('Link copied!'); }
    function shareAsset() { if(currentItem && navigator.share) navigator.share({ title: currentItem.Nama, url: `${window.location.origin}${window.location.pathname}?code=${currentItem.Kode}` }).catch(()=>copyAssetLink()); else copyAssetLink(); }
    function resetFilters() { document.getElementById('searchInput').value = ''; document.getElementById('categoryFilter').value = 'all'; showOnlyFavorites = false; applyFilters(); showToast('Filters reset'); }
    function updateHeroStats() { document.getElementById('statAssets').innerText = originalItems.length; }
    function processURLParams() { const params = new URLSearchParams(window.location.search); const code = params.get('code'); if(code) { const item = allItems.find(i=>i.Kode===code); if(item) setTimeout(()=>openModal(item),300); } }
    
    function initTheme() { const saved = localStorage.getItem('ctfy_theme')||'dark'; if(saved==='light') document.documentElement.setAttribute('data-theme','light'); document.getElementById('themeToggle').addEventListener('click',()=>{ const cur=document.documentElement.getAttribute('data-theme'); if(cur==='light'){ document.documentElement.removeAttribute('data-theme'); localStorage.setItem('ctfy_theme','dark'); } else { document.documentElement.setAttribute('data-theme','light'); localStorage.setItem('ctfy_theme','light'); } }); }
    
    function initEvents() {
        document.getElementById('searchInput').addEventListener('input',()=>applyFilters());
        document.getElementById('categoryFilter').addEventListener('change',()=>applyFilters());
        document.getElementById('resetBtn').addEventListener('click',resetFilters);
        document.getElementById('showFavOnly').addEventListener('click',()=>{ showOnlyFavorites=!showOnlyFavorites; applyFilters(); });
        document.getElementById('surpriseBtn').addEventListener('click',surpriseMe);
        document.getElementById('requestBtn').addEventListener('click',openRequestModal);
        window.addEventListener('popstate',()=>processURLParams());
        document.addEventListener('keydown',(e)=>{ if(e.key==='Escape'){ const modal=document.querySelector('.modal'); if(modal) modal.remove(); } if(e.key==='/' && document.activeElement!==document.getElementById('searchInput')){ e.preventDefault(); document.getElementById('searchInput').focus(); } });
    }
    
    function verifyPIN() { let pin=''; for(let i=1;i<=6;i++) pin+=document.getElementById(`pin${i}`).value; if(pin==='123456'){ document.getElementById('pinOverlay').style.display='none'; document.getElementById('mainContent').classList.add('visible'); loadData(); initTheme(); loadFavorites(); initEvents(); } else { document.getElementById('pinError').innerHTML='PIN salah!'; } }
    
    function autoTab() { for(let i=1;i<=5;i++) document.getElementById(`pin${i}`).addEventListener('input',(e)=>{ if(e.target.value.length===1) document.getElementById(`pin${i+1}`).focus(); }); }
    
    window.verifyPIN=verifyPIN; window.openModalByCode=openModalByCode; window.copyAssetLink=copyAssetLink; window.shareAsset=shareAsset; window.scrollToCatalog=scrollToCatalog; window.resetFilters=resetFilters; window.toggleFavorite=toggleFavorite; window.openCollection=openCollection; window.openRequestModal=openRequestModal; window.closeRequestModal=closeRequestModal; window.submitRequest=submitRequest;
    autoTab();
</script>
</body>
</html>
